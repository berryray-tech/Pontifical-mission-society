<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Projects | Pontifical Mission Society</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- AOS CSS -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <!-- Font Awesome 6 -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <!-- Supabase Client -->
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(145deg, #0b1a22 0%, #132b34 50%, #1e3e4a 100%);
      color: #f0f3f8;
      overflow-x: hidden;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
    ::-webkit-scrollbar-thumb { background: rgba(255,215,150,0.5); border-radius: 10px; }

    .navbar {
      background: rgba(10, 25, 30, 0.65);
      backdrop-filter: blur(14px);
      padding: 12px 0;
    }
    .navbar-brand {
      font-weight: 700;
      font-size: 1.7rem;
      background: linear-gradient(135deg, #FFE6B0, #FFC97E);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent !important;
    }
    .logo-icon { font-size: 1.8rem; color: #FFD966; margin-right: 8px; }
    .nav-link { color: rgba(255,248,225,0.9) !important; font-weight: 500; margin: 0 6px; transition: 0.3s; }
    .nav-link:hover, .nav-link.active { color: #FFD966 !important; transform: translateY(-2px); }

    .page-header { padding: 140px 20px 60px; text-align: center; }
    .glass-header {
      background: rgba(20, 40, 48, 0.55);
      backdrop-filter: blur(16px);
      border-radius: 3rem;
      padding: 2rem;
      border: 1px solid rgba(255,230,170,0.35);
      display: inline-block;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.3);
    }
    .glass-header h1 {
      font-size: 3.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #FFF6E0, #FFDA88);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .glass-tabs {
      background: rgba(25, 45, 55, 0.4);
      backdrop-filter: blur(12px);
      border-radius: 60px;
      padding: 8px;
      display: inline-flex;
      gap: 0.5rem;
      border: 1px solid rgba(255,230,170,0.25);
    }
    .glass-tab-btn {
      background: transparent;
      border: none;
      padding: 0.8rem 2rem;
      border-radius: 50px;
      color: #f0f3f8;
      font-weight: 600;
      transition: all 0.3s;
      cursor: pointer;
    }
    .glass-tab-btn i { margin-right: 8px; }
    .glass-tab-btn.active {
      background: linear-gradient(135deg, #FFD966, #FFB347);
      color: #1e2f38;
      box-shadow: 0 4px 15px rgba(255,217,102,0.3);
    }

    .project-card {
      background: rgba(25, 45, 55, 0.5);
      backdrop-filter: blur(14px);
      border-radius: 1.5rem;
      border: 1px solid rgba(255,230,170,0.25);
      overflow: hidden;
      transition: all 0.4s;
      height: 100%;
      cursor: pointer;
    }
    .project-card:hover {
      transform: translateY(-10px) scale(1.02);
      background: rgba(35, 65, 78, 0.75);
      border-color: #FFD966;
      box-shadow: 0 25px 40px rgba(0,0,0,0.4);
    }
    .project-img-wrapper {
      position: relative;
      overflow: hidden;
      height: 220px;
    }
    .project-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s ease;
    }
    .project-card:hover .project-img { transform: scale(1.08); }
    .project-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(0deg, rgba(0,0,0,0.8), transparent);
      padding: 1.2rem;
    }
    .project-badge {
      background: rgba(255,217,102,0.25);
      backdrop-filter: blur(8px);
      padding: 0.3rem 1rem;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: 600;
      color: #FFD966;
      margin-bottom: 0.5rem;
      display: inline-block;
    }
    .project-card h3 { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.3rem; }
    .project-card p { font-size: 0.8rem; opacity: 0.85; }
    .project-info { padding: 1rem; }
    .project-stats { display: flex; gap: 1rem; margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px solid rgba(255,230,170,0.2); flex-wrap: wrap; }
    .stat { display: flex; align-items: center; gap: 0.3rem; font-size: 0.7rem; }
    .stat i { color: #FFD966; }

    .projects-tab { display: none; }
    .projects-tab.active-tab { display: block; }

    .admin-btn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 55px;
      height: 55px;
      background: linear-gradient(135deg, #FFD966, #FFB347);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 100;
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    }
    .admin-btn:hover { transform: scale(1.1); }
    .admin-btn i { font-size: 1.5rem; color: #1e2f38; }

    .btn-outline-gold {
      border: 1px solid #FFD966;
      background: transparent;
      color: #FFD966;
      border-radius: 40px;
      padding: 8px 28px;
      transition: 0.25s;
    }
    .btn-outline-gold:hover { background: #FFD966; color: #1e2f38; }

    .modal-content {
      background: rgba(20, 40, 48, 0.98);
      backdrop-filter: blur(20px);
      border: 1px solid #FFD966;
      border-radius: 1.5rem;
      color: white;
    }
    .modal-img { width: 100%; max-height: 300px; object-fit: cover; border-radius: 1rem; }
    .glass-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(8px); border: 1px solid rgba(255,230,170,0.2); border-radius: 1rem; padding: 1rem; }
    .counter-value { font-size: 1.5rem; font-weight: 800; color: #FFD966; }

    @media (max-width: 768px) {
      .glass-header h1 { font-size: 2rem; }
      .glass-tab-btn { padding: 0.5rem 1.2rem; font-size: 0.8rem; }
      .project-img-wrapper { height: 180px; }
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg fixed-top">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" href="index.html">
      <i class="fas fa-church logo-icon"></i>
      <span>Pontifical Mission Society</span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html"><i class="fas fa-home me-1"></i>Home</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html"><i class="fas fa-heart me-1"></i>About</a></li>
        <li class="nav-item"><a class="nav-link" href="animators.html"><i class="fas fa-users me-1"></i>Animators</a></li>
        <li class="nav-item"><a class="nav-link active" href="projects.html"><i class="fas fa-hands-helping me-1"></i>Projects</a></li>
        <li class="nav-item"><a class="nav-link" href="news.html"><i class="fas fa-newspaper me-1"></i>News</a></li>
        <li class="nav-item"><a class="nav-link" href="contact.html"><i class="fas fa-envelope me-1"></i>Contact</a></li>
        <li class="nav-item"><a class="nav-link" href="gallery.html"><i class="fas fa-images me-1"></i>Gallery</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="page-header">
  <div class="container">
    <div class="glass-header" data-aos="fade-up">
      <h1><i class="fas fa-project-diagram me-2"></i>Our Kingdom Projects</h1>
      <p>Transforming lives, building communities, expanding God's kingdom</p>
    </div>
  </div>
</div>

<div class="container text-center" data-aos="fade-up" data-aos-delay="200">
  <div class="glass-tabs">
    <button class="glass-tab-btn active" data-tab="ongoing"><i class="fas fa-spinner"></i> Ongoing</button>
    <button class="glass-tab-btn" data-tab="completed"><i class="fas fa-check-circle"></i> Completed</button>
    <button class="glass-tab-btn" data-tab="upcoming"><i class="fas fa-calendar-alt"></i> Upcoming</button>
  </div>
</div>

<section class="projects-section" style="padding: 40px 20px 80px;">
  <div class="container">
    <div id="ongoing-projects" class="projects-tab active-tab"><div class="row g-4" id="ongoingGrid"></div></div>
    <div id="completed-projects" class="projects-tab"><div class="row g-4" id="completedGrid"></div></div>
    <div id="upcoming-projects" class="projects-tab"><div class="row g-4" id="upcomingGrid"></div></div>
  </div>
</section>

<div class="modal fade" id="projectModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title" id="modalTitle" style="color:#FFD966;"></h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
      <div class="modal-body"><img id="modalImage" class="modal-img mb-3" alt=""><p id="modalDescription"></p><div class="row mt-3" id="modalDetails"></div></div>
      <div class="modal-footer"><button class="btn btn-outline-warning" data-bs-dismiss="modal">Close</button><button class="btn btn-warning" id="modalSupportBtn">Support</button></div>
    </div>
  </div>
</div>

<div class="admin-btn" id="adminBtn"><i class="fas fa-lock"></i></div>

<div class="modal fade" id="adminLoginModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title" style="color:#FFD966;">Admin Login</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
      <div class="modal-body"><input type="text" id="loginUsername" class="form-control mb-3" placeholder="Username"><input type="password" id="loginPassword" class="form-control mb-3" placeholder="Password"><button class="btn btn-outline-gold w-100" id="doLoginBtn">Login</button></div>
    </div>
  </div>
</div>

<footer style="background: rgba(5, 20, 25, 0.8); padding: 2rem; text-align: center; margin-top: 2rem;">
  <p><i class="fas fa-cross me-1"></i> © 2026 Pontifical Mission Society · Spreading the Gospel Worldwide</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
  AOS.init({ once: true, offset: 60, duration: 700 });

  const SUPABASE_URL = 'https://ekhzbclqpelsrfefufpv.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVraHpiY2xxcGVsc3JmZWZ1ZnB2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NjQ2MjUsImV4cCI6MjA5MjQ0MDYyNX0.7dJiDcV4q8Ss_4Ua19-L-VFSxThJKNLyBv__bfdx02M';
  
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  
  let currentProjects = [];

  async function loadProjects() {
    // Show loading
    document.getElementById('ongoingGrid').innerHTML = '<div class="col-12 text-center"><div class="spinner-border text-warning"></div></div>';
    document.getElementById('completedGrid').innerHTML = '<div class="col-12 text-center"><div class="spinner-border text-warning"></div></div>';
    document.getElementById('upcomingGrid').innerHTML = '<div class="col-12 text-center"><div class="spinner-border text-warning"></div></div>';
    
    const { data, error } = await supabase.from('projects').select('*');
    
    if (error) {
      console.error('Error:', error);
      document.getElementById('ongoingGrid').innerHTML = '<div class="col-12 text-center">Error loading projects. Please make sure the "projects" table exists in Supabase.</div>';
      return;
    }
    
    if (data && data.length > 0) {
      currentProjects = data;
      renderProjects(data);
    } else {
      document.getElementById('ongoingGrid').innerHTML = '<div class="col-12 text-center"><div class="glass-header">No projects found. Add some using the admin panel!</div></div>';
      document.getElementById('completedGrid').innerHTML = '<div class="col-12 text-center"><div class="glass-header">No projects found.</div></div>';
      document.getElementById('upcomingGrid').innerHTML = '<div class="col-12 text-center"><div class="glass-header">No projects found.</div></div>';
    }
  }
  
  function renderProjects(projects) {
    const ongoing = projects.filter(p => p.category === 'ongoing');
    const completed = projects.filter(p => p.category === 'completed');
    const upcoming = projects.filter(p => p.category === 'upcoming');
    
    document.getElementById('ongoingGrid').innerHTML = ongoing.map(p => createCard(p, 'ongoing')).join('');
    document.getElementById('completedGrid').innerHTML = completed.map(p => createCard(p, 'completed')).join('');
    document.getElementById('upcomingGrid').innerHTML = upcoming.map(p => createCard(p, 'upcoming')).join('');
    
    attachCardEvents();
  }
  
  function createCard(p, type) {
    let badge = '';
    let stats = '';
    
    if (type === 'ongoing') {
      badge = `<span class="project-badge"><i class="fas fa-sync-alt"></i> ${p.progress || 'In Progress'}</span>`;
      stats = `<div class="project-stats"><div class="stat"><i class="fas fa-chart-line"></i> Raised: ${p.raised || 'N/A'}</div><div class="stat"><i class="fas fa-bullseye"></i> Goal: ${p.goal || 'N/A'}</div><div class="stat"><i class="fas fa-map-marker-alt"></i> ${p.location || 'N/A'}</div></div>`;
    } else if (type === 'completed') {
      badge = `<span class="project-badge"><i class="fas fa-check-circle"></i> Completed ${p.completion_date || ''}</span>`;
      stats = `<div class="project-stats"><div class="stat"><i class="fas fa-users"></i> ${p.impact || 'N/A'}</div><div class="stat"><i class="fas fa-money-bill-wave"></i> ${p.cost || 'N/A'}</div><div class="stat"><i class="fas fa-map-marker-alt"></i> ${p.location || 'N/A'}</div></div>`;
    } else {
      badge = `<span class="project-badge"><i class="fas fa-calendar-alt"></i> Starts ${p.planned_start || 'TBA'}</span>`;
      stats = `<div class="project-stats"><div class="stat"><i class="fas fa-calendar"></i> ${p.planned_start || 'TBA'}</div><div class="stat"><i class="fas fa-chart-line"></i> Est. ${p.estimated_cost || 'N/A'}</div><div class="stat"><i class="fas fa-map-marker-alt"></i> ${p.location || 'N/A'}</div></div>`;
    }
    
    return `
      <div class="col-md-6 col-lg-4">
        <div class="project-card" data-id="${p.id}" data-type="${type}">
          <div class="project-img-wrapper">
            <img src="${p.image_url || 'https://images.unsplash.com/photo-1438032005730-c779502df39b?w=800&h=500&fit=crop'}" class="project-img" loading="lazy">
            <div class="project-overlay">${badge}<h3>${escapeHtml(p.title)}</h3><p>${escapeHtml(p.description.substring(0, 100))}${p.description.length > 100 ? '...' : ''}</p></div>
          </div>
          <div class="project-info">${stats}</div>
        </div>
      </div>
    `;
  }
  
  function attachCardEvents() {
    document.querySelectorAll('.project-card').forEach(card => {
      card.addEventListener('click', () => {
        const id = parseInt(card.dataset.id);
        const project = currentProjects.find(p => p.id === id);
        if (project) openModal(project, card.dataset.type);
      });
    });
  }
  
  function openModal(project, type) {
    document.getElementById('modalTitle').innerHTML = `<i class="fas fa-project-diagram me-2"></i>${escapeHtml(project.title)}`;
    document.getElementById('modalImage').src = project.image_url || 'https://images.unsplash.com/photo-1438032005730-c779502df39b?w=800&h=500&fit=crop';
    document.getElementById('modalDescription').innerHTML = escapeHtml(project.description);
    
    let details = '';
    if (type === 'ongoing') {
      details = `<div class="col-md-6"><div class="glass-card"><small class="text-warning">PROGRESS</small><div class="counter-value">${project.progress || '0%'}</div></div></div>
                 <div class="col-md-6"><div class="glass-card"><small class="text-warning">RAISED / GOAL</small><div class="counter-value">${project.raised || 'N/A'}</div><small>of ${project.goal || 'N/A'}</small></div></div>
                 <div class="col-12 mt-2"><i class="fas fa-calendar-alt text-warning me-2"></i> Started: ${project.start_date || 'N/A'}</div>
                 <div class="col-12"><i class="fas fa-flag-checkered text-warning me-2"></i> Expected: ${project.completion_date || 'N/A'}</div>`;
    } else if (type === 'completed') {
      details = `<div class="col-md-6"><div class="glass-card"><small class="text-warning">IMPACT</small><div class="counter-value">${project.impact || 'N/A'}</div></div></div>
                 <div class="col-md-6"><div class="glass-card"><small class="text-warning">COST</small><div class="counter-value">${project.cost || 'N/A'}</div></div></div>
                 <div class="col-12 mt-2"><i class="fas fa-check-circle text-warning me-2"></i> Completed: ${project.completion_date || 'N/A'}</div>`;
    } else {
      details = `<div class="col-md-6"><div class="glass-card"><small class="text-warning">PLANNED START</small><div class="counter-value">${project.planned_start || 'TBA'}</div></div></div>
                 <div class="col-md-6"><div class="glass-card"><small class="text-warning">ESTIMATED COST</small><div class="counter-value">${project.estimated_cost || 'N/A'}</div></div></div>
                 <div class="col-12 mt-2"><i class="fas fa-eye text-warning me-2"></i> Vision: ${escapeHtml(project.vision || 'N/A')}</div>`;
    }
    document.getElementById('modalDetails').innerHTML = details;
    new bootstrap.Modal(document.getElementById('projectModal')).show();
  }
  
  function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }
  
  // Tab switching
  document.querySelectorAll('.glass-tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.glass-tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const tab = btn.dataset.tab;
      document.querySelectorAll('.projects-tab').forEach(t => t.classList.remove('active-tab'));
      document.getElementById(`${tab}-projects`).classList.add('active-tab');
    });
  });
  
  document.getElementById('modalSupportBtn')?.addEventListener('click', () => alert('Thank you for your support! 🙏'));
  
  // Simple demo admin login (no database needed)
  let isAdmin = false;
  document.getElementById('adminBtn')?.addEventListener('click', () => {
    if (isAdmin) {
      alert('Admin mode active. Add projects by editing the Supabase table directly.');
    } else {
      Swal.fire({
        title: 'Admin Login',
        html: '<input id="adminUser" class="swal2-input" placeholder="Username"><input id="adminPass" class="swal2-input" type="password" placeholder="Password">',
        preConfirm: () => {
          const user = document.getElementById('adminUser').value;
          const pass = document.getElementById('adminPass').value;
          if (user === 'admin' && pass === 'admin123') {
            isAdmin = true;
            Swal.fire('Success!', 'You are now in admin mode.', 'success');
            document.getElementById('adminBtn').innerHTML = '<i class="fas fa-cog"></i>';
          } else {
            Swal.fire('Error!', 'Invalid credentials', 'error');
          }
        }
      });
    }
  });
  
  loadProjects();
  console.log('%c✨ Projects Page Loaded ✨', 'color: #FFD966; font-size: 16px');
</script>
</body>
</html>
