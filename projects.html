    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(145deg, #0b1a22 0%, #132b34 50%, #1e3e4a 100%);

      overflow-x: hidden;
      min-height: 100vh;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.05);
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255,215,150,0.5);
      border-radius: 10px;
    }

    /* NAVBAR - sleek glass */
    .navbar {
      background: rgba(10, 25, 30, 0.65);
      backdrop-filter: blur(14px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      transition: 0.3s;
      padding: 12px 0;
    }
    .navbar-brand {
      font-weight: 700;
      font-size: 1.7rem;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #FFE6B0, #FFC97E);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent !important;
    }
    .logo-icon {
      font-size: 1.8rem;
      color: #FFD966;
      margin-right: 8px;
    }
    .nav-link {
      color: rgba(255,248,225,0.9) !important;
      font-weight: 500;
      margin: 0 6px;
      transition: 0.3s;
      position: relative;
    }
    .nav-link:hover, .nav-link.active {
      color: #FFD966 !important;
      transform: translateY(-2px);
    }
    .navbar-toggler {
      border-color: rgba(255,215,150,0.6);
    }
    .navbar-toggler-icon {
      filter: brightness(0) invert(1);
    }

    /* Page Header with Glass Effect */
    .page-header {
      position: relative;
      padding: 140px 20px 60px;
      text-align: center;
      overflow: hidden;
    }
    .glass-header {
      background: rgba(20, 40, 48, 0.55);
      backdrop-filter: blur(16px);
      border-radius: 3rem;
      padding: 2rem;
      border: 1px solid rgba(255,230,170,0.35);
      display: inline-block;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.3);
    }
    .glass-header h1 {
      font-size: 3.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #FFF6E0, #FFDA88);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
    }
    .glass-header p {
      font-size: 1.2rem;
      opacity: 0.9;
    }

    /* Modern Glass Tabs */
    .glass-tabs {
      background: rgba(25, 45, 55, 0.4);
      backdrop-filter: blur(12px);
      border-radius: 60px;
      padding: 8px;
      display: inline-flex;
      gap: 0.5rem;
      border: 1px solid rgba(255,230,170,0.25);
    }
    .glass-tab-btn {
      background: transparent;
      border: none;
      padding: 0.8rem 2rem;
      border-radius: 50px;
      color: #f0f3f8;
      font-weight: 600;
      transition: all 0.3s;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    .glass-tab-btn i {
      margin-right: 8px;
    }
    .glass-tab-btn.active {
      background: linear-gradient(135deg, #FFD966, #FFB347);
      color: #1e2f38;
      box-shadow: 0 4px 15px rgba(255,217,102,0.3);
    }
    .glass-tab-btn:hover:not(.active) {
      background: rgba(255,217,102,0.2);
      transform: translateY(-2px);
    }

    /* Project Card - Modern Glass with Hover Effects */
    .project-card {
      background: rgba(25, 45, 55, 0.5);
      backdrop-filter: blur(14px);
      border-radius: 1.5rem;
      border: 1px solid rgba(255,230,170,0.25);
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      height: 100%;
      cursor: pointer;
      position: relative;
    }

    .project-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      border-radius: 1.5rem;
      padding: 2px;
      background: linear-gradient(135deg, rgba(255,217,102,0), rgba(255,217,102,0));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      transition: 0.4s;
      pointer-events: none;
    }

    .project-card:hover::before {
      background: linear-gradient(135deg, #FFD966, #FFB347, #FFD966);
      background-size: 200% 200%;
      animation: borderGlow 1.5s ease infinite;
    }

    @keyframes borderGlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .project-card:hover {
      transform: translateY(-10px) scale(1.02);
      background: rgba(35, 65, 78, 0.75);
      border-color: transparent;
      box-shadow: 0 25px 40px -12px rgba(0,0,0,0.5);
    }

    .project-img-wrapper {
      position: relative;
      overflow: hidden;
      height: 240px;
    }
    .project-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s ease;
    }
    .project-card:hover .project-img {
      transform: scale(1.08);
    }
    .project-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(0deg, rgba(0,0,0,0.8), transparent);
      padding: 1.5rem 1rem 1rem;
      transform: translateY(0);
      transition: 0.3s;
    }
    .project-badge {
      display: inline-block;
      background: rgba(255,217,102,0.25);
      backdrop-filter: blur(8px);
      padding: 0.3rem 1rem;
      border-radius: 30px;
      font-size: 0.75rem;
      font-weight: 600;
      color: #FFD966;
      margin-bottom: 0.5rem;
    }
    .project-card h3 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
    }
    .project-card p {
      font-size: 0.85rem;
      opacity: 0.85;
      margin: 0;
    }

    .project-info {
      padding: 1.2rem 1.2rem 1.5rem;
    }
    .project-stats {
      display: flex;
      gap: 1rem;
      margin-top: 0.8rem;
      padding-top: 0.8rem;
      border-top: 1px solid rgba(255,230,170,0.2);
    }
    .stat {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8rem;
    }
    .stat i {
      color: #FFD966;
      font-size: 0.9rem;
    }

    /* Modern Modal Styling */
    .modal-content {
      background: rgba(20, 40, 48, 0.95);
      backdrop-filter: blur(20px);
      border: 1px solid #FFD966;
      border-radius: 1.5rem;
      color: white;
    }
    .modal-header {
      border-bottom-color: rgba(255,217,102,0.3);
    }
    .modal-footer {
      border-top-color: rgba(255,217,102,0.3);
    }
    .modal-img {
      width: 100%;
      max-height: 400px;
      object-fit: cover;
      border-radius: 1rem;
    }

    /* Section spacing */
    .projects-section {
      padding: 40px 20px 80px;
    }

    /* Counter Animation */
    .counter-value {
      font-size: 1.8rem;
      font-weight: 800;
      color: #FFD966;
    }

    /* Footer */
    footer {
      background: rgba(5, 20, 25, 0.8);

      text-align: center;
      border-top: 1px solid rgba(255,210,130,0.2);

    @media (max-width: 768px) {
      .glass-header h1 {

      .glass-tab-btn {

        font-size: 0.85rem;
      }
      .project-img-wrapper {
        height: 200px;
      }
      .project-card h3 {
        font-size: 1.2rem;
      }
    }
  </style>
</head>

  // Helper function to create project card HTML
  function createProjectCard(project, type) {
    let statusBadge = '';
    let progressHtml = '';
    
    if (type === 'ongoing') {
      statusBadge = `<span class="project-badge"><i class="fas fa-sync-alt fa-fw me-1"></i> ${project.progress} Complete</span>`;
      progressHtml = `
        <div class="progress mt-2" style="height: 6px; background: rgba(255,255,255,0.2);">
          <div class="progress-bar bg-warning" style="width: ${project.progress};"></div>
        </div>
      `;
    } else if (type === 'completed') {
      statusBadge = `<span class="project-badge"><i class="fas fa-check-circle me-1"></i> Completed ${project.completedDate}</span>`;
    } else {
      statusBadge = `<span class="project-badge"><i class="fas fa-calendar-alt me-1"></i> Starts ${project.plannedStart}</span>`;
    }
    
    let statHtml = '';
    if (type === 'ongoing') {
      statHtml = `
        <div class="project-stats">
          <div class="stat"><i class="fas fa-chart-line"></i> <span>Raised: ${project.raised}</span></div>
          <div class="stat"><i class="fas fa-bullseye"></i> <span>Goal: ${project.goal}</span></div>
          <div class="stat"><i class="fas fa-map-marker-alt"></i> <span>${project.location}</span></div>
        </div>
      `;
    } else if (type === 'completed') {
      statHtml = `
        <div class="project-stats">
          <div class="stat"><i class="fas fa-users"></i> <span>${project.impact}</span></div>
          <div class="stat"><i class="fas fa-money-bill-wave"></i> <span>${project.cost}</span></div>
          <div class="stat"><i class="fas fa-map-marker-alt"></i> <span>${project.location}</span></div>
        </div>
      `;
    } else {
      statHtml = `
        <div class="project-stats">
          <div class="stat"><i class="fas fa-calendar"></i> <span>${project.plannedStart}</span></div>
          <div class="stat"><i class="fas fa-chart-line"></i> <span>Est. ${project.estimatedCost}</span></div>
          <div class="stat"><i class="fas fa-map-marker-alt"></i> <span>${project.location}</span></div>
        </div>
      `;
    }
    
    return `
      <div class="col-md-6 col-lg-4" data-aos="fade-up" data-aos-delay="100">
        <div class="project-card" data-project-id="${project.id}" data-project-type="${type}">
          <div class="project-img-wrapper">
            <img src="${project.image}" alt="${project.title}" class="project-img" loading="lazy">
            <div class="project-overlay">
              ${statusBadge}
              <h3>${escapeHtml(project.title)}</h3>
              <p>${escapeHtml(project.description.substring(0, 80))}${project.description.length > 80 ? '...' : ''}</p>
            </div>
          </div>
          <div class="project-info">
            ${progressHtml}
            ${statHtml}
          </div>
        </div>
      </div>
    `;
  }
  
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }
  
  // Render projects
  function renderProjects() {
    const ongoingGrid = document.getElementById('ongoingGrid');
    const completedGrid = document.getElementById('completedGrid');
    const upcomingGrid = document.getElementById('upcomingGrid');
    
    if (ongoingGrid) {
      ongoingGrid.innerHTML = projectsData.ongoing.map(p => createProjectCard(p, 'ongoing')).join('');
    }
    if (completedGrid) {
      completedGrid.innerHTML = projectsData.completed.map(p => createProjectCard(p, 'completed')).join('');
    }
    if (upcomingGrid) {
      upcomingGrid.innerHTML = projectsData.upcoming.map(p => createProjectCard(p, 'upcoming')).join('');
    }
    
    // Attach click handlers to project cards
    document.querySelectorAll('.project-card').forEach(card => {
      card.addEventListener('click', (e) => {
        // Don't trigger if clicking on progress bar area that might have interactive elements
        if (e.target.closest('.progress')) return;
        const projectId = parseInt(card.getAttribute('data-project-id'));
        const projectType = card.getAttribute('data-project-type');
        let project = null;
        
        if (projectType === 'ongoing') {
          project = projectsData.ongoing.find(p => p.id === projectId);
        } else if (projectType === 'completed') {
          project = projectsData.completed.find(p => p.id === projectId);
        } else {
          project = projectsData.upcoming.find(p => p.id === projectId);
        }
        
        if (project) {
          openModal(project, projectType);
        }
      });
    });
  }
  
  // Open modal with project details
  function openModal(project, type) {
    document.getElementById('modalTitle').innerHTML = `<i class="fas fa-project-diagram me-2"></i>${escapeHtml(project.title)}`;
    document.getElementById('modalImage').src = project.image;
    document.getElementById('modalDescription').innerHTML = escapeHtml(project.description);
    
    let detailsHtml = '';
    if (type === 'ongoing') {
      detailsHtml = `
        <div class="col-md-6">
          <div class="glass-card p-3 rounded">
            <small class="text-warning">PROGRESS</small>
            <div class="counter-value">${project.progress}</div>
          </div>
        </div>
        <div class="col-md-6">
          <div class="glass-card p-3 rounded">
            <small class="text-warning">RAISED / GOAL</small>
            <div class="counter-value">${escapeHtml(project.raised)}</div>
            <small>of ${escapeHtml(project.goal)}</small>
          </div>
        </div>
        <div class="col-md-6 mt-2">
          <div><i class="fas fa-calendar-alt text-warning me-2"></i> Started: ${escapeHtml(project.startDate)}</div>
        </div>
        <div class="col-md-6 mt-2">
          <div><i class="fas fa-flag-checkered text-warning me-2"></i> Expected: ${escapeHtml(project.completion)}</div>
        </div>
      `;
    } else if (type === 'completed') {
      detailsHtml = `
        <div class="col-md-6">
          <div class="glass-card p-3 rounded">
            <small class="text-warning">IMPACT</small>
            <div class="counter-value">${escapeHtml(project.impact)}</div>
          </div>
        </div>
        <div class="col-md-6">
          <div class="glass-card p-3 rounded">
            <small class="text-warning">TOTAL COST</small>
            <div class="counter-value">${escapeHtml(project.cost)}</div>
          </div>
        </div>
        <div class="col-12 mt-2">
          <div><i class="fas fa-check-circle text-warning me-2"></i> Completed: ${escapeHtml(project.completedDate)}</div>
          <div class="mt-2 p-3 bg-warning bg-opacity-10 rounded">
            <i class="fas fa-quote-left text-warning me-2"></i> ${escapeHtml(project.testimonial)}
          </div>
        </div>
      `;
    } else {
      detailsHtml = `
        <div class="col-md-6">
          <div class="glass-card p-3 rounded">
            <small class="text-warning">PLANNED START</small>
            <div class="counter-value">${escapeHtml(project.plannedStart)}</div>
          </div>
        </div>
        <div class="col-md-6">
          <div class="glass-card p-3 rounded">
            <small class="text-warning">ESTIMATED COST</small>
            <div class="counter-value">${escapeHtml(project.estimatedCost)}</div>
          </div>
        </div>
        <div class="col-12 mt-2">
          <div><i class="fas fa-eye text-warning me-2"></i> Vision: ${escapeHtml(project.vision)}</div>
        </div>
      `;
    }
    
    document.getElementById('modalDetails').innerHTML = detailsHtml;
    
    const supportBtn = document.getElementById('modalSupportBtn');
    supportBtn.onclick = () => {
      alert(`Thank you for your interest in supporting "${project.title}"! Our support team will contact you shortly. 🙏`);
    };
    
    const modal = new bootstrap.Modal(document.getElementById('projectModal'));
    modal.show();
  }
  
  // Tab switching functionality
  function initTabs() {
    const tabs = document.querySelectorAll('.glass-tab-btn');
    const tabContents = document.querySelectorAll('.projects-tab');
    
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const tabName = tab.getAttribute('data-tab');
        
        // Update active tab styling
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        
        // Hide all tab contents and show selected
        tabContents.forEach(content => content.classList.remove('active-tab'));
        
        if (tabName === 'ongoing') {
          document.getElementById('ongoing-projects').classList.add('active-tab');
        } else if (tabName === 'completed') {
          document.getElementById('completed-projects').classList.add('active-tab');
        } else if (tabName === 'upcoming') {
          document.getElementById('upcoming-projects').classList.add('active-tab');
        }
      });
    });
  }
  
  // Add CSS for tab display
  const style = document.createElement('style');
  style.textContent = `
    .projects-tab {
      display: none;
    }
    .projects-tab.active-tab {
      display: block;
    }
    .glass-card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,230,170,0.2);
    }
    .progress-bar {
      transition: width 0.6s ease;
    }
  `;
  document.head.appendChild(style);
  
  // Initialize
  renderProjects();
  initTabs();
  
  // Set default active tab
  document.getElementById('ongoing-projects').classList.add('active-tab');
</script>

</body>
</html>
